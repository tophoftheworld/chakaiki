<script>
  (function () {
    var MAX = 120;
    function ts() {
      try {
        return new Date().toISOString().split('T')[1].replace('Z', '');
      } catch (_) {
        return '';
      }
    }
    function line(level, msg) {
      return '[' + ts() + '] ' + level + ' ' + msg;
    }
    var store = {
      lines: [],
      push: function push(level, msg) {
        var text = line(level, String(msg || ''));
        this.lines.push(text);
        if (this.lines.length > MAX) this.lines.splice(0, this.lines.length - MAX);
        try { window.dispatchEvent(new Event('v2:debug-updated')); } catch (_) {}
      },
      read: function read() { return this.lines.slice(); },
    };
    window.__V2_DEBUG__ = store;
    store.push('INFO', 'v2 page boot start');
    window.addEventListener('unhandledrejection', function (event) {
      var reason = event && event.reason ? (event.reason.message || String(event.reason)) : 'Unknown promise rejection';
      store.push('REJECT', reason);
    });
  })();
</script>
<script>
  (function() {

        message: 'Set a valid GOOGLE_MAPS_API_KEY in js/config.js (Maps JavaScript API + Places).',

      return;

    var script = document.createElement('script');
    script.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&libraries=places';
    script.async = false;
    script.onload = function () {

    };
    script.onerror = function () {
      window.__V2_DEBUG__ && window.__V2_DEBUG__.push('ERROR', 'maps script failed to load');
    };
    document.head.appendChild(script);
  })();
</script>
